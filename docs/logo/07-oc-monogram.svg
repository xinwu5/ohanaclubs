<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200">
  <defs>
    <linearGradient id="g7" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#5cc4d1"/>
      <stop offset="100%" stop-color="#0f7286"/>
    </linearGradient>
  </defs>
  <!-- "oc" monogram with wave inside the o -->
  <g transform="translate(100 100)">
    <circle cx="-22" cy="0" r="44" fill="none" stroke="url(#g7)" stroke-width="14"/>
    <!-- The "c" formed by an open arc -->
    <path d="M 60 -28 A 38 38 0 1 0 60 28"
          fill="none" stroke="url(#g7)" stroke-width="14" stroke-linecap="round"/>
    <!-- Wave inside the "o" -->
    <path d="M-46 6 Q -34 -2 -22 6 T 2 6"
          fill="none" stroke="#168ea0" stroke-width="4" stroke-linecap="round"/>
    <path d="M-46 16 Q -34 8 -22 16 T 2 16"
          fill="none" stroke="#168ea0" stroke-width="4" stroke-linecap="round" opacity="0.5"/>
  </g>
</svg>
