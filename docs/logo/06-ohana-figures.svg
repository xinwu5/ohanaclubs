<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200">
  <defs>
    <linearGradient id="g6" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#5cc4d1"/>
      <stop offset="100%" stop-color="#0c5a6c"/>
    </linearGradient>
  </defs>
  <!-- Ground / wave -->
  <path d="M0 152 Q 50 134 100 152 T 200 152 L 200 200 L 0 200 Z" fill="url(#g6)" opacity="0.55"/>
  <!-- Three figures: parent + two kids, abstract -->
  <g fill="#168ea0">
    <!-- parent -->
    <circle cx="100" cy="60" r="18"/>
    <path d="M76 90 Q 100 80 124 90 L 124 152 L 76 152 Z"/>
    <!-- left kid -->
    <circle cx="50" cy="86" r="14"/>
    <path d="M32 110 Q 50 102 68 110 L 68 152 L 32 152 Z"/>
    <!-- right kid -->
    <circle cx="150" cy="86" r="14"/>
    <path d="M132 110 Q 150 102 168 110 L 168 152 L 132 152 Z"/>
  </g>
  <!-- Connecting line (holding hands / unity) -->
  <path d="M50 134 Q 100 122 150 134" fill="none" stroke="#ff7e6b" stroke-width="4" stroke-linecap="round"/>
</svg>
