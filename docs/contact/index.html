</head>
<body>

<header class="site-header">
  <div class="wrap">
    <a class="logo" href="/">
      <svg viewBox="0 0 32 32" width="28" height="28" aria-hidden="true">
        <defs>
          <linearGradient id="lg" x1="0" y1="0" x2="1" y2="1">
            <stop offset="0%" stop-color="#5cc4d1"/>
            <stop offset="100%" stop-color="#0f7286"/>
          </linearGradient>
        </defs>
        <circle cx="16" cy="16" r="14" fill="url(#lg)"/>
        <path d="M2 20 Q 8 16 14 20 T 26 20 T 38 20" fill="none" stroke="#fff" stroke-width="2" stroke-linecap="round" opacity="0.9"/>
        <path d="M2 24 Q 8 20 14 24 T 26 24 T 38 24" fill="none" stroke="#fff" stroke-width="2" stroke-linecap="round" opacity="0.55"/>
      </svg>
      <span>ohana<b>clubs</b></span>
    </a>
    <nav>
      <a href="/schedule/">Schedule</a>
      <a href="/map/">Map</a>
      <a href="/contact/">Contact</a>
    </nav>
  </div>
</header>

<main class="wrap">
  <header class="page-head">
    <h1>Contact us</h1>
    <p class="page-sub">
      Bug? Feature idea? Wrong field on the map? We&rsquo;d love to hear from you. Most messages get a reply within a day or two.
    </p>
  </header>

  <form id="contact-form" class="contact-form" novalidate>
    <div class="row">
      <label for="name">Your name <span class="hint">(optional)</span></label>
      <input id="name" name="name" type="text" autocomplete="name" maxlength="100">
    </div>

    <div class="row">
      <label for="email">Your email <span class="hint">(optional &mdash; only if you want a reply)</span></label>
      <input id="email" name="email" type="email" autocomplete="email" maxlength="200">
    </div>

    <div class="row">
      <label for="message">Message</label>
      <textarea id="message" name="message" rows="6" required maxlength="5000" placeholder="What's on your mind?"></textarea>
    </div>

    <!-- Honeypot: bots fill this; humans never see it. -->
    <div class="hp" aria-hidden="true">
      <label for="website">Website</label>
      <input id="website" name="website" type="text" tabindex="-1" autocomplete="off">
    </div>

    <!-- Web3Forms metadata -->
    <input type="hidden" name="from_name" value="ohanaclubs.com">
    <input type="hidden" name="subject" value="ohanaclubs feedback">

    <div class="actions">
      <button id="submit" class="btn primary" type="submit">Send message</button>
      <p id="status" class="status hide" role="status"></p>
    </div>
  </form>
</main>

<footer class="site-footer">
  <div class="wrap"><p>&copy; ohanaclubs &middot; not affiliated with Oahu League / HYSA.</p></div>
</footer>

<script src="config.js"></script>
<script src="app.js"></script>
</body>
</html>
